services:
  postgres:
    image: postgres:18
    container_name: trading_bot_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: trading_bot
      POSTGRES_USER: trading_bot_user
      POSTGRES_PASSWORD: trading_bot_password
    ports:
      - "5432:5432"
    volumes:
      - trading_bot_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trading_bot_user -d trading_bot"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  trading_bot_postgres_data: